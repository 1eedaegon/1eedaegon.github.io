name: CI

on:
  pull_request:
    branches: [main]
  schedule:
    # Weekly link-rot / dependency-advisory sweep (deploy gating lives in deploy.yml)
    - cron: '0 21 * * 0'
  workflow_dispatch:

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e

      - name: Check internal links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --base ./dist
            --no-progress
            --exclude-loopback
            --exclude 'localhost'
            --exclude 'yourusername'
            --exclude 'your.email'
            --exclude 'example.com'
            --exclude 'cv.pdf'
            --include-fragments
            ./dist/**/*.html
          fail: true
